<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Portfolio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <img class="background-image" src="/assets/background.jpg">
    <img class="logo-image" src="/assets/logo.jpeg">
    <div id="folders" class="folders"></div>
    <script>
        async function loadProjects() {
        const response = await fetch('projects.json');
        const folders = await response.json();

        const foldersElement = document.getElementById('folders');

        for (let folderIndex = 0; folderIndex < folders.length; folderIndex++) {
            const folder = folders[folderIndex];
            
            const folderElement = document.createElement('div');
            folderElement.className = "folder";

            const linkElement = document.createElement('a');
            linkElement.href = `folder.html?folder=${encodeURIComponent(folder.folder)}`;

            const imgElement = document.createElement('img');
            imgElement.src = folder.folderImage;
            imgElement.alt = folder.folder;

            linkElement.appendChild(imgElement);
            folderElement.appendChild(linkElement);

            foldersElement.appendChild(folderElement);
        }
        }

        loadProjects();
    </script>

</body>
</html>
